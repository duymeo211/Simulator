# ---------------------------------------------------------------------------
# TC-04: test VHAL
# ---------------------------------------------------------------------------
- name: "Test SYNC button"
  description: "Enable SYNC button"
  channel: 1
  can_id: "0x381"            # ACN1S04
  send_signals:
    I_DUSY: 1
  expect_vhal:                
    - property: "HVAC_DUAL_ON"
      area: ROW_1_LEFT
      value: true
  timeout: 10000
# ---------------------------------------------------------------------------
# TC-03: test VHAL
# ---------------------------------------------------------------------------
- name: "Defrost shows on screen"
  description: "Inject I_DEF=1, I_RRDEF=1 and verify the HVAC UI reacts"
  channel: 1
  message: "ACN1S04"
  send_signals:
    I_DEF: 1
  expect_vhal:                
    - property: "HVAC_DEFROSTER"
      area: ROW_1_LEFT
      value: true
  timeout: 10000
